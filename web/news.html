<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>뉴스 · 뉴스레터</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --text-muted: #666666;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #e5e7eb;
      --surface: #f9fafb;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text); background: var(--bg); line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 820px; margin: 0 auto; padding: 0 24px; }

    /* Nav (공통) */
    header { border-bottom: 1px solid var(--border); padding: 16px 0; }
    .nav { display: flex; align-items: center; justify-content: space-between; max-width: 820px; margin: 0 auto; padding: 0 24px; }
    .logo { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; text-decoration: none; color: var(--text); }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-links a { font-size: 15px; color: var(--text-muted); text-decoration: none; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--text); font-weight: 600; }
    .nav-cta { font-size: 14px; font-weight: 600; color: #fff !important; background: var(--accent); padding: 8px 16px; border-radius: 8px; }
    .nav-cta:hover { background: var(--accent-hover); }

    /* Title */
    .page-title { padding: 40px 0 20px; }
    .page-title h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.03em; }
    .page-title p { color: var(--text-muted); margin-top: 8px; }

    /* View tabs (최신 / 아카이브) */
    .view-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .view-tab {
      padding: 10px 16px; font-size: 15px; font-weight: 600; color: var(--text-muted);
      background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Industry filter */
    .filter-bar { margin-bottom: 28px; }
    .filter-label { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      font-size: 14px; padding: 7px 14px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 999px; cursor: pointer;
      user-select: none; transition: all 0.12s;
    }
    .chip:hover { border-color: var(--accent); }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Week block */
    .week { margin-bottom: 40px; }
    .week-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .week-label { font-size: 18px; font-weight: 700; }
    .week-date { font-size: 13px; color: var(--text-muted); }

    /* Industry group within a week */
    .ind-group { margin-bottom: 20px; }
    .ind-group-title {
      font-size: 13px; font-weight: 700; color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 8px;
    }

    /* News item */
    .news-item {
      display: block; padding: 14px 16px; border: 1px solid var(--border);
      border-radius: 10px; margin-bottom: 8px; text-decoration: none; color: inherit;
      transition: border-color 0.12s;
    }
    .news-item:hover { border-color: var(--accent); }
    .news-item-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
    .news-title { font-size: 15px; font-weight: 700; }
    .news-summary { font-size: 14px; color: var(--text-muted); }
    .news-why { font-size: 13px; color: var(--text); margin-top: 6px; padding: 6px 10px; background: var(--surface); border-radius: 6px; }
    .news-meta { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .meta-tag { font-size: 12px; color: var(--text-muted); background: var(--surface); padding: 2px 8px; border-radius: 6px; }

    /* Premium locked item */
    .news-item.locked { background: var(--surface); cursor: default; }
    .news-item.locked:hover { border-color: var(--border); }
    .lock-badge { font-size: 11px; font-weight: 600; color: #854d0e; background: #fef9c3; padding: 2px 8px; border-radius: 6px; }
    .locked .news-title { color: var(--text-muted); }

    .premium-cta {
      text-align: center; padding: 20px; background: var(--surface);
      border: 1px dashed var(--border); border-radius: 10px; margin-top: 8px;
      font-size: 14px; color: var(--text-muted);
    }
    .premium-cta a { color: var(--accent); font-weight: 600; text-decoration: none; }

    .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }

    footer { border-top: 1px solid var(--border); padding: 32px 0; text-align: center; font-size: 13px; color: var(--text-muted); }
    footer a { color: var(--text-muted); }

    @media (max-width: 640px) {
      .page-title h1 { font-size: 25px; }
      .nav-links a:not(.nav-cta) { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <a href="index.html" class="logo">뉴스레터</a>
      <div class="nav-links">
        <a href="news.html" class="active">뉴스</a>
        <a href="pricing.html">요금</a>
        <a href="about.html">소개</a>
        <a href="index.html" class="nav-cta">구독하기</a>
      </div>
    </nav>
  </header>

  <main>
    <div class="container">
      <div class="page-title">
        <h1>뉴스</h1>
        <p>산업별로 그 주에 가장 중요한 소식을 모았습니다.</p>
      </div>

      <div class="view-tabs">
        <button class="view-tab active" data-view="latest">최신</button>
        <button class="view-tab" data-view="archive">지난 호 아카이브</button>
      </div>

      <div class="filter-bar">
        <div class="filter-label">산업 필터 (여러 개 선택 가능 · 선택 안 하면 전체)</div>
        <div class="chips" id="chips"></div>
      </div>

      <div id="content"></div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>© 2026 뉴스레터 · <a href="privacy.html">개인정보처리방침</a></p>
    </div>
  </footer>

  <script>
    // 상태
    let DATA = null;
    let activeIndustries = new Set(); // 비어있으면 전체
    let currentView = "latest";       // latest | archive

    // 데이터 로드
    async function loadData() {
      try {
        const res = await fetch("news.json");
        if (!res.ok) throw new Error("news.json을 불러오지 못했습니다.");
        DATA = await res.json();
        renderChips();
        render();
      } catch (e) {
        document.getElementById("content").innerHTML =
          '<div class="empty">뉴스를 불러오는 중 문제가 발생했습니다.<br>news.json 파일이 같은 폴더에 있는지 확인해 주세요.</div>';
        console.error(e);
      }
    }

    // 산업 라벨 조회
    function industryLabel(id) {
      const found = DATA.industries.find((x) => x.id === id);
      return found ? found.label : id;
    }

    // 필터 칩 렌더링
    function renderChips() {
      const wrap = document.getElementById("chips");
      wrap.innerHTML = "";
      DATA.industries.forEach((ind) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.textContent = ind.label;
        chip.onclick = () => {
          if (activeIndustries.has(ind.id)) {
            activeIndustries.delete(ind.id);
            chip.classList.remove("active");
          } else {
            activeIndustries.add(ind.id);
            chip.classList.add("active");
          }
          render();
        };
        wrap.appendChild(chip);
      });
    }

    // 뷰 탭 이벤트
    document.querySelectorAll(".view-tab").forEach((tab) => {
      tab.onclick = () => {
        document.querySelectorAll(".view-tab").forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        currentView = tab.dataset.view;
        render();
      };
    });

    // 특정 주차가 필터에 걸리는지 확인 후 HTML 생성
    function renderWeek(week) {
      // 산업 필터 적용
      let items = week.items;
      if (activeIndustries.size > 0) {
        items = items.filter((it) => activeIndustries.has(it.industry));
      }
      if (items.length === 0) return "";

      // 산업별로 그룹핑
      const byIndustry = {};
      items.forEach((it) => {
        if (!byIndustry[it.industry]) byIndustry[it.industry] = [];
        byIndustry[it.industry].push(it);
      });

      let html = `<div class="week">
        <div class="week-head">
          <span class="week-label">${week.week_label}</span>
          <span class="week-date">${week.published_at}</span>
        </div>`;

      Object.keys(byIndustry).forEach((indId) => {
        html += `<div class="ind-group">
          <div class="ind-group-title">${industryLabel(indId)}</div>`;

        byIndustry[indId].forEach((it) => {
          if (it.tier === "premium") {
            // 프리미엄 뉴스는 잠금 표시 (제목만 흐리게, 링크 없음)
            html += `<div class="news-item locked">
              <div class="news-item-top">
                <span class="lock-badge">프리미엄</span>
                <span class="news-title">${it.title}</span>
              </div>
              <div class="news-summary">프리미엄 구독자에게 공개되는 뉴스입니다.</div>
            </div>`;
          } else {
            html += `<a class="news-item" href="${it.link}" target="_blank" rel="noopener">
              <div class="news-item-top">
                <span class="news-title">${it.title}</span>
              </div>
              <div class="news-summary">${it.summary}</div>
              ${it.why_it_matters ? `<div class="news-why">💡 ${it.why_it_matters}</div>` : ""}
              <div class="news-meta">
                <span class="meta-tag">${it.source}</span>
                ${it.event_type ? `<span class="meta-tag">${it.event_type}</span>` : ""}
                ${it.sentiment ? `<span class="meta-tag">${it.sentiment}</span>` : ""}
              </div>
            </a>`;
          }
        });

        html += `</div>`;
      });

      // 프리미엄 유도 (해당 주차에 premium 뉴스가 있을 때)
      const hasPremium = items.some((it) => it.tier === "premium");
      if (hasPremium) {
        html += `<div class="premium-cta">
          더 많은 뉴스를 광고 없이 보고 싶다면 <a href="pricing.html">프리미엄 알아보기 →</a>
        </div>`;
      }

      html += `</div>`;
      return html;
    }

    // 메인 렌더
    function render() {
      const content = document.getElementById("content");
      if (!DATA || !DATA.weeks || DATA.weeks.length === 0) {
        content.innerHTML = '<div class="empty">아직 발행된 뉴스가 없습니다.</div>';
        return;
      }

      // 최신: 가장 최근 1개 주차 / 아카이브: 그 외 지난 주차들
      let weeksToShow;
      if (currentView === "latest") {
        weeksToShow = [DATA.weeks[0]];
      } else {
        weeksToShow = DATA.weeks.slice(1);
        if (weeksToShow.length === 0) {
          content.innerHTML = '<div class="empty">아직 지난 호가 없습니다.<br>다음 주부터 이곳에 쌓입니다.</div>';
          return;
        }
      }

      let html = weeksToShow.map(renderWeek).join("");
      if (html.trim() === "") {
        html = '<div class="empty">선택한 산업에 해당하는 뉴스가 없습니다.</div>';
      }
      content.innerHTML = html;
    }

    loadData();
  </script>
</body>
</html>
